name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Build
      run: pyinstaller --onefile --windowed --name "Messenger" main.py
    - name: Upload
      uses: actions/upload-artifact@v3
      with:
        name: Messenger-EXE
        path: dist/Messenger.exe
